        function buscarYMostrarLocomotora(searchValue) {
            if (!searchValue) return;
            
            var resultDiv = document.getElementById('searchResult');
            var found = locomotorasData.find(function(loco) {
                return loco.locomotora.toUpperCase() === searchValue.toUpperCase();
            });
            
            if (found) {
                resultDiv.innerHTML = 
                    '<div style="color: #06A77D; font-weight: bold;">✅ Encontrada!</div>' +
                    '<hr style="margin: 5px 0;">' +
                    '<b>🚂 Locomotora:</b> ' + found.locomotora + '<br>' +
                    '<b>🚊 Línea:</b> ' + found.linea + '<br>' +
                    '<b>🚆 Tren:</b> ' + found.tren + '<br>' +
                    '<b>📅 Última pos:</b> ' + found.fecha + '<br>' +
                    '<b>⏱️ Hace:</b> ' + found.dias + ' días<br>' +
                    '<b>📊 Estado:</b> ' + found.categoria + '<br>' +
                    '<div style="margin-top: 10px; padding: 8px; background: #06A77D; color: white; border-radius: 4px; text-align: center; font-weight: bold;">📍 Centrando en el mapa...</div>';
                resultDiv.style.display = 'block';
                
                var mapName = window.map_cc7780712c500a07aa0f3e2e766b33e6;
                mapName.setView([found.lat, found.lon], 12, {animate: true, duration: 1});
                
                setTimeout(function() {
                    var markerFound = false;
                    mapName.eachLayer(function(layer) {
                        if (layer instanceof L.Marker) {
                            var latlng = layer.getLatLng();
                            if (Math.abs(latlng.lat - found.lat) < 0.0001 && 
                                Math.abs(latlng.lng - found.lon) < 0.0001) {
                                layer.openPopup();
                                markerFound = true;
                            }
                        }
                    });
                    
                    if (markerFound) {
                        resultDiv.innerHTML = 
                            '<div style="color: #06A77D; font-weight: bold;">✅ ¡Locomotora localizada!</div>' +
                            '<hr style="margin: 5px 0;">' +
                            '<b>🚂 Locomotora:</b> ' + found.locomotora + '<br>' +
                            '<b>🚊 Línea:</b> ' + found.linea + '<br>' +
                            '<b>⏱️ Hace:</b> ' + found.dias + ' días<br>' +
                            '<small style="color: #666;">El popup está abierto en el mapa</small>';
                    }
                }, 1000);
                
            } else {
                resultDiv.innerHTML = '<div style="color: #C73E1D; font-weight: bold;">❌ No encontrada en este mapa</div>' +
                    '<small style="color: #666;">Verifica el número e intenta nuevamente</small>';
                resultDiv.style.display = 'block';
            }
        }
        
        document.getElementById('locoSearch').addEventListener('input', function(e) {
            var searchValue = e.target.value.trim();
            var resultDiv = document.getElementById('searchResult');
            
            if (searchValue === '') {
                resultDiv.style.display = 'none';
                return;
            }
            
            var found = locomotorasData.find(function(loco) {
                return loco.locomotora.toUpperCase() === searchValue.toUpperCase();
            });
            
            if (found) {
                resultDiv.innerHTML = 
                    '<div style="color: #06A77D; font-weight: bold;">✅ Encontrada!</div>' +
                    '<hr style="margin: 5px 0;">' +
                    '<b>🚂 Locomotora:</b> ' + found.locomotora + '<br>' +
                    '<b>🚊 Línea:</b> ' + found.linea + '<br>' +
                    '<b>⏱️ Hace:</b> ' + found.dias + ' días<br>' +
                    '<small style="color: #666; font-style: italic;">Presiona Enter para ver en el mapa</small>';
                resultDiv.style.display = 'block';
            } else {
                resultDiv.innerHTML = '<div style="color: #C73E1D;">❌ No encontrada</div>';
                resultDiv.style.display = 'block';
            }
        });
        
        document.getElementById('locoSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                var searchValue = this.value.trim();
                if (searchValue !== '') {
                    buscarYMostrarLocomotora(searchValue);
                }
